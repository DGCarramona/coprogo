app.database.host=${DB_HOST\:localhost}
app.database.port=${DB_PORT\:5432}
app.database.name=${DB_NAME\:coprogo}
app.database.username=${DB_USERNAME\:coprogo}
app.database.password=${DB_PASSWORD\:coprogo}

datasources.migration.db-type=postgres
datasources.migration.driver-class-name=org.postgresql.Driver

flyway.datasources.migration.enabled=true
flyway.datasources.migration.locations=classpath:db/migration

r2dbc.datasources.default.db-type=postgres
r2dbc.datasources.default.options.driver=pool
r2dbc.datasources.default.options.protocol=postgresql
r2dbc.datasources.migration.enabled=false
r2dbc.datasources.migration.url=r2dbc:postgresql://localhost:1/unused

jooq.r2dbc-datasources.default.sql-dialect=POSTGRES

micronaut.application.name=coprogo
micronaut.environments.default=runtime,local
micronaut.security.authentication=bearer
micronaut.security.token.jwt.signatures.jwks.google.url=${coprogo.security.google-id-token.jwks-url}

coprogo.security.google-id-token.audiences=${GOOGLE_ID_TOKEN_AUDIENCES}
coprogo.security.google-id-token.issuers=accounts.google.com,https://accounts.google.com
coprogo.security.google-id-token.jwks-url=https://www.googleapis.com/oauth2/v3/certs

# OpenAPI generation and local exposure
micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/swagger/**
