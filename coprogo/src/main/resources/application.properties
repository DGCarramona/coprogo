# Local/default PostgreSQL connection settings, overridable via environment variables.
app.database.host=${DB_HOST\:localhost}
app.database.port=${DB_PORT\:5432}
app.database.name=${DB_NAME\:coprogo}
app.database.username=${DB_USERNAME\:coprogo}
app.database.password=${DB_PASSWORD\:coprogo}

datasources.default.db-type=postgres
datasources.default.driver-class-name=org.postgresql.Driver
datasources.default.url=jdbc:postgresql://${app.database.host}:${app.database.port}/${app.database.name}
datasources.default.username=${app.database.username}
datasources.default.password=${app.database.password}
flyway.datasources.default.enabled=true

r2dbc.datasources.default.db-type=postgres
r2dbc.datasources.default.dialect=POSTGRES
r2dbc.datasources.default.url=r2dbc:postgresql://${app.database.host}:${app.database.port}/${app.database.name}
r2dbc.datasources.default.username=${app.database.username}
r2dbc.datasources.default.password=${app.database.password}

micronaut.application.name=coprogo
micronaut.security.authentication=bearer
micronaut.security.token.jwt.signatures.secret.generator.secret=${JWT_GENERATOR_SIGNATURE_SECRET\:pleaseChangeThisSecretForANewOne}

# OpenAPI generation and local exposure
micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/swagger/**
