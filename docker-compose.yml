name: coprogo

services:
  postgres:
    image: postgres:17
    container_name: db
    environment:
      POSTGRES_DB: coprogo
      POSTGRES_USER: coprogo
      POSTGRES_PASSWORD: coprogo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coprogo -d coprogo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
