version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Lisbon"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
      timezone: "Europe/Lisbon"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "build"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      backend-non-major:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:20"
      timezone: "Europe/Lisbon"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "build"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      frontend-non-major:
        update-types:
          - "minor"
          - "patch"
