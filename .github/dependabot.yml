version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Lisbon"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:05"
      timezone: "Europe/Lisbon"
    labels:
      - "dependencies"
      - "build"
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      root-gradle-tooling:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: "gradle"
    directory: "/coprogo"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
      timezone: "Europe/Lisbon"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "build"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      kotlin-tooling:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp*"
          - "org.jlleitschuh.gradle.ktlint*"
          - "com.gradleup.shadow*"
      micronaut-stack:
        patterns:
          - "io.micronaut*"
          - "io.micronaut.gradle*"
      backend-non-major:
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:20"
      timezone: "Europe/Lisbon"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "build"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      angular-stack:
        patterns:
          - "@angular/*"
          - "angular-eslint"
          - "typescript"
          - "rxjs"
          - "tslib"
      eslint-tooling:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
      frontend-non-major:
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 7
