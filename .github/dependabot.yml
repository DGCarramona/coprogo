version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: UTC
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      composer-non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: UTC
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions-non-major:
        update-types:
          - minor
          - patch
