name: Dependency Submission

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: dependency-submission-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle-dependency-submission:
    name: Gradle dependency submission
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Generate and submit Gradle dependency graph
        uses: gradle/actions/dependency-submission@v6
        with:
          build-root-directory: coprogo
          gradle-version: '9.5.0'
          dependency-graph: generate-and-submit

  npm-dependency-submission:
    name: npm dependency submission
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Generate and submit npm dependency graph
        uses: advanced-security/component-detection-dependency-submission-action@v0.1.1
        with:
          filePath: frontend
          detectorsCategories: Npm
          detectorArgs: NpmLockfile3=EnableIfDefaultOff
          correlator: frontend-npm
