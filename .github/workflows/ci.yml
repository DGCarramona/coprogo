name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality-and-tests:
    name: Quality and Tests (PHP 8.4)
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_SECRET: ci-test-secret
      DATABASE_URL: sqlite:///%kernel.project_dir%/var/test.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: ctype, iconv

      - name: Validate composer files
        run: composer validate --strict

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Security audit (composer audit)
        run: composer audit --locked --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress

      - name: Run PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --config=.php-cs-fixer.php --dry-run --diff --verbose

      - name: Run PHPUnit
        run: vendor/bin/phpunit -c phpunit.dist.xml
