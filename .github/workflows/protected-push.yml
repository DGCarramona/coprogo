name: Protected Push

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: protected-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality-and-tests:
    name: Backend quality and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run backend checks
        run: ./gradlew --no-daemon ktlintCheck backendCheck

  backend-native:
    name: Backend native compile
    runs-on: ubuntu-latest
    needs: backend-quality-and-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: '21'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build native executable
        run: ./gradlew --no-daemon nativeCompile

  frontend-quality-and-tests:
    name: Frontend quality and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run format check
        run: npm run format:check
        working-directory: frontend

      - name: Run lint
        run: npm run lint
        working-directory: frontend

      - name: Run tests
        run: npm run test -- --watch=false
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
