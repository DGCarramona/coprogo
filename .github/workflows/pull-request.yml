name: Pull Request

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backend-quality-and-tests:
    name: Backend quality and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run backend format check
        run: ./gradlew --no-daemon ktlintCheck

      - name: Run backend checks
        run: ./gradlew --no-daemon backendCheck

  frontend-quality-and-tests:
    name: Frontend quality and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run format check
        run: npm run format:check
        working-directory: frontend

      - name: Run lint
        run: npm run lint
        working-directory: frontend

      - name: Run tests
        run: npm run test -- --watch=false
        working-directory: frontend
